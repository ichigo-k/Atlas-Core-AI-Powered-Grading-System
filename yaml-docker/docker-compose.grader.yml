# ═══════════════════════════════════════════════════════════════════════════════
# verion-ai-grader — Docker Compose (Hostinger VPS)
#
# Services:
#   grader   — Django AI grading microservice (Ollama backend)
#   ollama   — Local LLM inference server
#   minio    — S3-compatible object storage for file attachments
#   postgres — Django system DB (auth_keys, migrations — NOT the shared Neon DB)
#
# The shared Neon database (DATABASE_URL) is external — not managed here.
#
# Usage:
#   1. Copy .env.example → .env in this folder and fill in values
#   2. docker network create grader-bridge  (one-time, shared with portal compose)
#   3. docker compose -f docker-compose.grader.yml up -d
#   4. Run migrations:
#      docker compose -f docker-compose.grader.yml exec grader python manage.py migrate
#   5. Generate API key for the portal:
#      docker compose -f docker-compose.grader.yml exec grader python manage.py generate_api_key --label "portal"
#   6. Pull an Ollama model:
#      docker compose -f docker-compose.grader.yml exec ollama ollama pull llama3
#
# GPU Support (if your VPS has an NVIDIA GPU):
#   Uncomment the `deploy` section under the ollama service.
#
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── AI Grader (Django + Gunicorn) ──────────────────────────────────────────
  grader:
    build:
      context: ../../verion-ai-grader
      dockerfile: Dockerfile
    container_name: verion-grader
    restart: unless-stopped
    ports:
      - "${GRADER_PORT:-8000}:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - DJANGO_DB_URL=postgresql://grader:${POSTGRES_PASSWORD}@grader-db:5432/grader_system
      - USE_OLLAMA=True
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL_ID=${OLLAMA_MODEL_ID:-llama3}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-300}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-4096}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - AWS_REGION=us-east-1
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-grader-uploads}
      - S3_UPLOAD_PREFIX=${S3_UPLOAD_PREFIX:-grader-uploads}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - DEBUG=${DEBUG:-False}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-300}
    depends_on:
      grader-db:
        condition: service_healthy
      ollama:
        condition: service_started
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8000/api/health/" ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - grader-net
      - grader-bridge

  # ── Ollama (Local LLM inference) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: verion-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    # ── GPU passthrough (uncomment for NVIDIA GPU) ──
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1" ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - grader-net

  # ── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: verion-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - grader-net

  # ── MinIO bucket auto-creation ────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: verion-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin}; mc mb --ignore-existing local/$${S3_BUCKET_NAME:-grader-uploads}; mc anonymous set download local/$${S3_BUCKET_NAME:-grader-uploads}; echo '✓ Bucket ready'; "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-grader-uploads}
    networks:
      - grader-net

  # ── PostgreSQL (Django system DB — NOT the shared Neon DB) ────────────────
  grader-db:
    image: postgres:16-alpine
    container_name: verion-grader-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=grader_system
      - POSTGRES_USER=grader
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U grader -d grader_system" ]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5
    networks:
      - grader-net

volumes:
  ollama-data:
    driver: local
  minio-data:
    driver: local
  postgres-data:
    driver: local

networks:
  grader-net:
    driver: bridge
  # Shared external network — lets portal containers reach the grader
  grader-bridge:
    external: true
    name: grader-bridge
