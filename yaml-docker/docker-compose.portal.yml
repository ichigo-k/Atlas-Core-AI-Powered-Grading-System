# ═══════════════════════════════════════════════════════════════════════════════
# ai-powered-grading-system (Exam Portal) — Docker Compose (Hostinger VPS)
#
# Services:
#   portal   — Next.js app (standalone mode)
#   redis    — Session/cache store (optional but recommended for production)
#
# The shared Neon database (DATABASE_URL) is external — not managed here.
# The AI grader runs in its own compose file (docker-compose.grader.yml).
#
# Usage:
#   1. Copy .env.example → .env in this folder and fill in values
#   2. docker network create grader-bridge  (one-time, shared between both composes)
#   3. docker compose -f docker-compose.portal.yml up -d
#   4. Prisma migrations run automatically on container start
#   5. Access at http://your-vps-ip:3000 (put behind nginx/Caddy for HTTPS)
#
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── Exam Portal (Next.js) ──────────────────────────────────────────────────
  portal:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: exam-portal
    restart: unless-stopped
    ports:
      - "${PORTAL_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - GRADER_URL=${GRADER_URL:-http://verion-grader:8000}
      - GRADER_API_KEY=${GRADER_API_KEY}
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - portal-net
      - grader-bridge

  # ── Redis (session store / caching) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: exam-portal-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 15s
      timeout: 3s
      retries: 3
    networks:
      - portal-net

volumes:
  redis-data:
    driver: local

networks:
  portal-net:
    driver: bridge
  # Shared external network — lets portal reach the grader containers
  grader-bridge:
    external: true
    name: grader-bridge
